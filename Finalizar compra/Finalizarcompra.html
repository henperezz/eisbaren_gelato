<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Finalizarcompra.css"> 
  <title>Finalizar compra</title>
  <link rel="shortcut icon" href="img/logo.jpg" type="image/x-icon"/>
</head>
<body>
  <header class="headerContainer" id="headerContainer">
    <div class="logoContainer">
      <img src="img/logo.jpg" alt="Logo Eisbaren" class="headerLogo"/>
    </div>

    <div class="headerTextContainer">
      <nav>
        <ul class="listHeader">
          <li class="linksList"><a class="textLink" href="">INÍCIO</a></li>
          <li class="linksList"><a class="textLink" href="">SAIBA MAIS</a></li>
          <li class="linksList"><a class="textLink" href="">PRODUTOS</a></li>
          <li class="linksList"><a class="textLink" href="">CARRINHO</a></li>
          <li class="linksList"><a class="textLink" href="">PERFIL</a></li>
          <li class="linksList">
            <a href="">
              <img src="img/group_24dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.png" alt="Perfil" class="perfilHeader"/>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  
    <div class="buttonSwitch" id="buttonSwitch">
      <div class="buttonIndicator"></div>
    </div>
  </header>

  <section class="imagem-inicial">
    <img src="img/Frame 18.png" alt="imagem inicial da Parte de Produtos">
    <h1>Finalizar <p>compra</p></h1>
  </section>
     
  <!-- WRAPPER PRINCIPAL -->
  <div class="checkout">

    <!-- BLOCO DO FORMULÁRIO -->
    <div class="container">
      <h2>Endereço de cobrança:</h2>
      <form>
        <div class="linha">
          <input type="text" placeholder="Nome" required>
          <input type="text" placeholder="Sobrenome" required>
        </div>

        <div class="linha">
          <input type="email" placeholder="Email" required>
          <input type="text" placeholder="Selecionar estado">
        </div>

        <div class="linha">
          <input type="text" placeholder="Selecione a cidade">
          <input type="text" placeholder="CEP / Código Postal">
        </div>

        <h2>Método de pagamento:</h2>

        <label class="opcao-pagamento">
          <input type="radio" name="pagamento" checked>
          <span>Cartão de crédito</span>
          <img src="img/credit_card_24dp_787878_FILL0_wght400_GRAD0_opsz24.png" alt="Cartão" class="img-cartao">
        </label>

        <input type="text" placeholder="Número do cartão">
        <input type="text" placeholder="Código de segurança">

        <label class="opcao-pagamento">
          <input type="radio" name="pagamento">
          <span>Pagamento na entrega</span>
          <img src="img/Symbol.png" alt="Dinheiro" class="img-Symbol">
        </label>

        <button type="button">Confirmar pedido</button>
      </form>
    </div>

    <!-- BLOCO DO RESUMO -->
    <div class="card">
      <h1>Resumo do pedido</h1>

      <hr>

      <div class="cupom-area">
        <input type="text" placeholder="Aplicar cupons" class="input-cupom">
        <button class="btn-cupom">Aplicar</button>
        
        <hr>

      </div>

      <div class="detalhes-pedido">
        <h3>Detalhes do produto:</h3>
        <div class="resumo-item">
          <span>Subtotal</span>
          <strong>R$200,99</strong>

        </div>

        <div class="resumo-item">
          <span>Envio</span>
          <strong>R$15,00</strong>
        </div>
      </div>

      <hr>

      <div class="resumo-total">
        <span>Total geral</span>
        <strong>R$215,99</strong>
      </div>

      <button class="btn-checkout"> Finalizar compra </button>
  
     <hr>

       <label class="text">

         <img src="img/Symbol (1).png" alt="Dinheiro" class=" img-Symbol">
        <p>Pagamentos seguros e protegidos, devoluções fáceis.
          Produtos 100% autênticos</p>
       </label>
    </div>

  <script src="Finalizarcompra.js"></script>

</body>
</html>
