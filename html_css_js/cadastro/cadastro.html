<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Eisbaren</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- icone do perfil -->
    <link rel="shortcut icon" href="img/coroa 2.png" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..20"
    />
    <link rel="stylesheet" href="style/cadastro.css" />
  </head>
  <body>
    <div class="login-container">
      <header>
        <a
          href="../index/index.html"
          style="text-decoration: none; color: inherit"
        >
          <span class="material-symbols-outlined back-icon"
            >arrow_back_ios</span
          >
        </a>

        <div class="profile-icon">
          <span class="material-symbols-outlined">person</span>
        </div>
        <h1>CADASTRE-SE</h1>
      </header>

      <form id="cadastroForm">
        <div class="input-group">
          <span class="material-symbols-outlined">person_outline</span>
          <input type="text" placeholder="Nome" required />
        </div>

        <div class="input-group">
          <span class="material-symbols-outlined">person_outline</span>
          <input type="text" placeholder="Sobrenome" required />
        </div>

        <div class="input-group">
          <span class="material-symbols-outlined">mail</span>
          <input type="email" placeholder="Email" id="email" required />
        </div>

        <div class="input-group">
          <span class="material-symbols-outlined">lock</span>
          <input type="password" placeholder="Senha" id="senha" required />
          <span class="material-symbols-outlined eye-icon">visibility_off</span>
        </div>

        <div class="input-group">
          <span class="material-symbols-outlined">lock</span>
          <input
            type="password"
            placeholder="Confirmar senha"
            id="confirmarSenha"
            required
          />
          <span class="material-symbols-outlined eye-icon">visibility_off</span>
        </div>

        <button type="submit" class="login-btn" id="btnEnviar">CADASTRO</button>
      </form>

      <footer>
        Já tem uma conta? <a href="../login/login.html">Entrar</a>
      </footer>
    </div>
    <script src="scripts/cadastro.js"></script>
  </body>
</html>
