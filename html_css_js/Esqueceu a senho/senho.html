<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a Senha</title>

    <link rel="stylesheet" href="style/senho.css">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>

      <link
      rel="shortcut icon"
      href="img/logo 48X48 (1).png"
      type="image/x-icon"
    />

<body>

    <div class="login-container">

        <header>
            <a href="login.html" style="text-decoration: none; color: inherit;">
                <span class="material-symbols-outlined back-icon">
                    arrow_back_ios
                </span>
            </a>

            <div class="profile-icon">
                <span class="material-symbols-outlined">person</span>
            </div>

            <h1>LOGIN</h1>
        </header>

        <form id="resetPasswordForm">

            <div class="input-group">
                <span class="material-symbols-outlined">lock</span>

                <input
                    type="password"
                    id="currentPassword"
                    placeholder="Senha atual"
                    required>

                <span class="material-symbols-outlined eye-icon">
                    visibility_off
                </span>
            </div>

            <div class="input-group">
                <span class="material-symbols-outlined">lock</span>

                <input
                    type="password"
                    id="newPassword"
                    placeholder="Nova senha"
                    required>

                <span class="material-symbols-outlined eye-icon">
                    visibility_off
                </span>
            </div>

            <div class="input-group">
                <span class="material-symbols-outlined">lock</span>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirme sua nova senha"
                    required>

                <span class="material-symbols-outlined eye-icon">
                    visibility_off
                </span>
            </div>

            <div class="reset-info">
                <p>Sua senha deve conter</p>
                <p>✓ de 8 a 12 caracteres</p>
                <p>✓ 1 letra maiúscula</p>
                <p>✓ 1 número</p>
            </div>

            <button
                type="submit"
                class="login-btn"
                id="btnContinue">
                CONTINUAR
            </button>

        </form>

    </div>

    <script src="scripts/senho.js"></script>

</body>

</html>
