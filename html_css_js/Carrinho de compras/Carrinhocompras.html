<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eisbaren Gelato</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <link
      rel="shortcut icon"
      href="../assets/img/Carrossel de AÇAI.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..20"
    />
  </head>
  <body>
    <header class="headerContainer" id="headerContainer">
      <!--id necessário para produzir o efeito de mudança de cor que será adicionado posteriormente-->
      <div class="logoContainer">
        <img
          src="../../assets/img/icones/logo.jpg"
          alt="Logo Eisbaren"
          class="headerLogo"
        />
      </div>

      <div class="headerTextContainer">
        <nav>
          <ul class="listHeader">
            <li class="linksList"><a class="textLink" href="">INÍCIO</a></li>
            <li class="linksList">
              <a class="textLink" href="">SAIBA MAIS</a>
            </li>
            <li class="linksList"><a class="textLink" href="">PRODUTOS</a></li>
            <li class="linksList"><a class="textLink" href="">CARRINHO</a></li>
            <li class="linksList"><a class="textLink" href="">PERFIL</a></li>
            <li class="linksList">
              <span class="material-symbols-outlined profile"> group </span>
            </li>
          </ul>
        </nav>
      </div>

     <div class="buttonSwitch" id="buttonSwitch">
      <div class="buttonIndicator"></div>
    </div>
  </header>

  <section class="imagem-inicial">
    <img src="img/Frame 18.png" alt="imagem inicial da Parte de Produtos">
    <h1>Carrinho de<p>compra</p></h1>
  </section>
  
    <div class="cart-header">
      <h2>Carrinho de compras</h2>
      <span id="cart-count">(4 Unid)</span>
    </div>

    <div class="cart-table-header">
      <p>Detalhes do produto</p>
      <p>Preço</p>
      <p>Quantidade</p>
      <p>Total</p>
    </div>

      <div class="img">
        <img src="img/Milkshake de Morango com caramelo de morango copy.png">
      </div>

      <h2>Milk-Shake de chocolate com raspas</h2>
            <p>Tamanho: M</p>
        </div>
    </div>
    
    <div class="item-price">
        <h3>R$ 10,00</h3>
    </div>

    <div class="item-quantity">
        <button class="buttonMinus buttonQuantity">-</button>
        <span id="valueQuantity">1</span>
        <button class="buttonPlus buttonQuantity">+</button>
    </div>

    <div class="item-total">
        <h3>R$ 10,00</h3>
    </div>

    <div class="item-remove">
        <img src="img/Button.png" alt="Botão para remover o item do carrinho">
    </div>

</div>



      <div class="buttonSwitch" id="buttonSwitch">
        <!--id necessária para captar no js, container especial que é o switcher de modos-->
        <div class="buttonIndicator"></div>
        <!--é o indicador do switcher-->
        
        <script src="scripts.js"></script>
        <!--chama o script js para a alteração das cores-->


      </div>
    </header>
