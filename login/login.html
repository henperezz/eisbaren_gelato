
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="style/login.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

    <div class="login-container">
        <header>
            <a href="saibamais.html" style="text-decoration: none; color: inherit;">
                <span class="material-symbols-outlined back-icon">arrow_back_ios</span>
            </a>

            <div class="profile-icon">
                <span class="material-symbols-outlined">person</span>
            </div>
            <h1>LOGIN</h1>
        </header>

        <form id="loginForm">
            <div class="input-group">
                <span class="material-symbols-outlined">mail</span>
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <span class="material-symbols-outlined">lock</span>
                <input type="password" placeholder="Senha" required>
                <span class="material-symbols-outlined eye-icon">visibility_off</span>
            </div>

            <div class="options">
                <label class="switch-container">
                    <input type="checkbox">
                    <span class="slider"></span>
                    <span class="label-text">remember-me</span>
                </label>
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="login-btn" id="btnLogin">LOGIN</button>
        </form>

        <div class="divider">
            <span>OU</span>
            <p>Entrar com</p>
        </div>

        <div class="social-login">
            <img src="img/google.png.png" alt="Google">
            <img src="img/apple.png.png" alt="Apple">
            <img src="img/facebook.png.png" alt="Facebook">
        </div>


        <footer>
            Não tem uma conta? <a href="cadastro.html">Cadastre-se agora</a>
        </footer>
    </div>
        <script src="scripts/login.js"></script>
</body>
</html>
